name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.26"

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate swagger docs        
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/api/main.go -o ./docs

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.0
          args: --timeout=5m

  # ── Job 2: Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate swagger docs        
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/api/main.go -o ./docs

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: go test ./... -race -cover -coverprofile=coverage.out -timeout=120s

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # ── Job 3: Build ───────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate swagger docs        
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/api/main.go -o ./docs

      - name: Download dependencies
        run: go mod download

      - name: Build API binary
        run: go build -v -ldflags="-s -w" -o bin/api ./cmd/api

      - name: Build Worker binary
        run: go build -v -ldflags="-s -w" -o bin/worker ./cmd/worker

      - name: Verify binaries exist
        run: |
          ls -lh bin/api bin/worker
          echo "✅ Both binaries built successfully"

  # ── Job 4: Security scan ───────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability check
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec security scan
        run: gosec -exclude-dir=docs ./...
        continue-on-error: true # report but don't block PR for now

  # ── Job 5: Swagger validation ──────────────────────────────────────
  swagger:
    name: Swagger Docs
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger docs
        run: swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal

      - name: Check for uncommitted swagger changes
        run: |
          if [ -n "$(git diff --name-only docs/)" ]; then
            echo "❌ Swagger docs are out of date."
            echo "Run 'make swag' locally and commit the updated docs/ folder."
            git diff docs/
            exit 1
          fi
          echo "✅ Swagger docs are up to date"